<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>✦ Tarot Oracle ✦</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='8' fill='%230a0a12'/><rect x='18' y='8' width='28' height='44' rx='3' fill='%231a1a2e' stroke='%23f5c842' stroke-width='2'/><rect x='22' y='12' width='20' height='32' rx='1' fill='%230a0a12'/><text x='32' y='34' text-anchor='middle' font-size='18' fill='%23f5c842'>✦</text><text x='32' y='58' text-anchor='middle' font-size='7' fill='%23f5c842' font-family='monospace'>TAROT</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --bg2: #12121e;
    --bg3: #1a1a2e;
    --gold: #f5c842;
    --gold2: #e6a817;
    --pink: #e040a0;
    --purple: #8b5cf6;
    --text: #e8e0d0;
    --text2: #a09080;
    --border: #2a2a40;
    --card-w: 120px;
    --card-h: 210px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 18px;
    min-height: 100vh;
    overflow-x: hidden;
    image-rendering: pixelated;
  }

  /* PIXEL STAR BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, #fff8 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, #fff5 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, #fff6 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, #fff4 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 35%, #fff7 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 85%, #fff3 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 45%, #fff5 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 60%, #fff6 0%, transparent 100%),
      radial-gradient(2px 2px at 40% 30%, #f5c84222 0%, transparent 100%),
      radial-gradient(2px 2px at 75% 15%, #8b5cf622 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 440px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 16px 16px 0;
    text-align: center;
  }
  .header-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: var(--gold);
    text-shadow: 0 0 8px #f5c84288, 2px 2px 0 #8b5cf688;
    letter-spacing: 2px;
    line-height: 1.6;
  }
  .header-sub {
    font-size: 14px;
    color: var(--text2);
    margin-top: 4px;
    letter-spacing: 1px;
  }
  .pixel-divider {
    height: 2px;
    background: repeating-linear-gradient(90deg, var(--gold) 0px, var(--gold) 4px, transparent 4px, transparent 8px);
    margin: 12px 0 0;
    opacity: 0.5;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    display: flex;
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 440px;
    background: var(--bg2);
    border-top: 2px solid var(--border);
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    padding: 12px 8px;
    background: none;
    border: none;
    color: var(--text2);
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
    letter-spacing: 0.5px;
  }
  .nav-btn.active { color: var(--gold); }
  .nav-icon { font-size: 18px; line-height: 1; }

  /* MAIN CONTENT */
  main {
    flex: 1;
    padding: 16px 16px 80px;
    overflow-y: auto;
  }

  /* TABS */
  .tab { display: none; }
  .tab.active { display: block; }

  /* ===== DRAW TAB ===== */
  .section-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--gold2);
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .options-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .pixel-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 8px 10px;
    background: var(--bg3);
    border: 2px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.1s;
    image-rendering: pixelated;
    position: relative;
  }
  .pixel-btn::after {
    content: '';
    position: absolute;
    bottom: -3px; right: -3px;
    width: 100%; height: 100%;
    background: var(--border);
    z-index: -1;
  }
  .pixel-btn.active, .pixel-btn:hover {
    background: var(--bg2);
    border-color: var(--gold);
    color: var(--gold);
  }
  .pixel-btn.active::after { background: var(--gold2); }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .toggle-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--text2);
    letter-spacing: 0.5px;
  }
  .pixel-toggle {
    width: 40px; height: 20px;
    background: var(--bg3);
    border: 2px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s;
  }
  .pixel-toggle.on { border-color: var(--gold); }
  .pixel-toggle::before {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: var(--border);
    transition: all 0.15s;
  }
  .pixel-toggle.on::before {
    left: 22px;
    background: var(--gold);
  }

  /* BIG DRAW BUTTON */
  .draw-btn-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
  }
  .draw-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 14px 28px;
    background: var(--bg3);
    border: 3px solid var(--gold);
    color: var(--gold);
    cursor: pointer;
    letter-spacing: 1px;
    position: relative;
    transition: all 0.1s;
    text-shadow: 0 0 6px var(--gold);
  }
  .draw-btn::after {
    content: '';
    position: absolute;
    bottom: -5px; right: -5px;
    width: 100%; height: 100%;
    background: var(--gold2);
    z-index: -1;
    opacity: 0.4;
  }
  .draw-btn:hover { background: #1a1a2e; box-shadow: 0 0 16px #f5c84244; }
  .draw-btn:active { transform: translate(2px, 2px); }

  /* CARD FLIP AREA - SINGLE */
  .card-area {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
    min-height: 240px;
    gap: 12px;
  }

  /* 3-CARD SPREAD AREA */
  .spread-area {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: nowrap;
    min-height: 240px;
    align-items: flex-start;
    padding-top: 10px;
  }
  .spread-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .spread-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: var(--purple);
    letter-spacing: 0.5px;
    text-align: center;
  }

  /* CARD FLIP */
  .card-flip {
    width: var(--card-w);
    height: var(--card-h);
    perspective: 600px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .card-flip-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(.4,0,.2,1);
  }
  .card-flip.flipped .card-flip-inner { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    border: 3px solid var(--border);
  }
  .card-back {
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card-back-pattern {
    width: 100%; height: 100%;
    background:
      repeating-linear-gradient(45deg, #f5c84211 0px, #f5c84211 2px, transparent 2px, transparent 8px),
      repeating-linear-gradient(-45deg, #8b5cf611 0px, #8b5cf611 2px, transparent 2px, transparent 8px),
      var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }
  .card-front {
    transform: rotateY(180deg);
    overflow: hidden;
    background: #111;
  }
  .card-front img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-front.reversed img {
    transform: rotate(180deg);
  }

  .card-tap-hint {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: var(--text2);
    text-align: center;
    letter-spacing: 0.5px;
    animation: blink 1.2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* DRAWN CARD INFO */
  .drawn-info {
    background: var(--bg2);
    border: 2px solid var(--border);
    padding: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .drawn-info.visible { display: block; }
  .drawn-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 6px;
    text-shadow: 0 0 6px #f5c84266;
    line-height: 1.6;
  }
  .drawn-meta {
    font-size: 15px;
    color: var(--text2);
    text-align: center;
    letter-spacing: 1px;
  }
  .drawn-reversed-badge {
    display: inline-block;
    background: var(--pink);
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    padding: 3px 7px;
    margin-top: 6px;
  }

  /* SPARKLE - DOM based */
  #sparkle-container { position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden; }

  /* ENLARGE BUTTONS */
  .drawn-actions {
    display: none;
    justify-content: center;
    margin: -4px 0 14px;
  }
  .enlarge-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    padding: 6px 10px;
    background: var(--bg3);
    border: 2px solid var(--purple);
    color: var(--purple);
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 0.5px;
    display: inline-block;
    transition: all 0.1s;
  }
  .enlarge-btn:hover { background: var(--bg2); border-color: var(--gold); color: var(--gold); }

  /* CARD DETAIL MODAL IMAGE */
  .modal-img-large {
    width: 100%;
    max-width: 140px;
    border: 2px solid var(--border);
    image-rendering: auto;
  }
  .modal-reversed-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 10px 0 4px;
  }
  .modal-rev-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: var(--text2);
    letter-spacing: 0.4px;
  }
  .modal-img-wrap.reversed-view img { transform: rotate(180deg); }

  /* HISTORY HEADING */
  .history-heading {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
    text-align: center;
    text-shadow: 0 0 6px #f5c84244;
  }
  .history-time {
    font-size: 12px;
    color: var(--purple);
    letter-spacing: 0.3px;
    margin-top: 2px;
  }

  /* ===== INFO TAB ===== */
  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filter-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    padding: 6px 8px;
    background: var(--bg3);
    border: 2px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    letter-spacing: 0.3px;
  }
  .filter-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: var(--bg2);
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .grid-card {
    cursor: pointer;
    background: var(--bg2);
    border: 2px solid var(--border);
    padding: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    transition: border-color 0.15s;
  }
  .grid-card:hover { border-color: var(--gold2); }
  .grid-card img {
    width: 100%;
    aspect-ratio: 0.58;
    object-fit: cover;
    display: block;
    image-rendering: auto;
  }
  .grid-card-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 5px;
    color: var(--text);
    text-align: center;
    line-height: 1.5;
    letter-spacing: 0.3px;
  }

  /* CARD DETAIL MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: #000a;
    z-index: 200;
    display: none;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 20px 12px 80px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 3px solid var(--gold);
    width: 100%;
    max-width: 400px;
    position: relative;
    box-shadow: 4px 4px 0 var(--gold2);
  }
  .modal-close {
    position: absolute;
    top: 8px; right: 8px;
    background: none;
    border: 2px solid var(--border);
    color: var(--text2);
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 5px 8px;
    cursor: pointer;
  }
  .modal-close:hover { border-color: var(--pink); color: var(--pink); }
  .modal-img-wrap {
    display: flex;
    justify-content: center;
    padding: 20px 20px 0;
  }
  .modal-img-wrap img {
    width: 110px;
    border: 2px solid var(--border);
    image-rendering: auto;
  }
  .modal-action-row {
    display: flex;
    justify-content: center;
    padding: 10px 20px 0;
  }
  .modal-body { padding: 16px 20px 20px; }
  .modal-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 6px;
    line-height: 1.6;
    text-shadow: 0 0 6px #f5c84244;
  }
  .modal-meta {
    font-size: 14px;
    color: var(--text2);
    text-align: center;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  .modal-section {
    margin-bottom: 12px;
  }
  .modal-section.hidden {
    display: none;
  }
  .modal-section-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--purple);
    letter-spacing: 0.5px;
    margin-bottom: 5px;
    text-transform: uppercase;
  }
  .modal-section-text {
    font-size: 15px;
    color: var(--text);
    line-height: 1.5;
    background: var(--bg3);
    border-left: 3px solid var(--border);
    padding: 8px 10px;
  }
  .modal-section-text.hindi {
    color: #d0c0e8;
    font-size: 16px;
    border-left-color: var(--purple);
    margin-top: 4px;
  }
  .lang-badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 5px;
    padding: 2px 5px;
    display: inline-block;
    margin-bottom: 3px;
  }
  .lang-en { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); }
  .lang-hi { background: var(--bg3); border: 1px solid var(--purple); color: var(--purple); }

  /* IMAGE-ONLY POPUP */
  .image-modal-overlay {
    position: fixed;
    inset: 0;
    background: #000c;
    z-index: 210;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .image-modal-overlay.open { display: flex; }
  .image-modal {
    background: var(--bg2);
    border: 3px solid var(--gold);
    width: 100%;
    max-width: 420px;
    position: relative;
    box-shadow: 4px 4px 0 var(--gold2);
    padding: 44px 16px 16px;
  }
  .image-modal-wrap {
    display: flex;
    justify-content: center;
  }
  .image-modal-wrap img {
    display: block;
    width: auto;
    max-width: 100%;
    max-height: calc(100vh - 120px);
    object-fit: contain;
    border: 2px solid var(--border);
    image-rendering: auto;
  }
  .image-modal-wrap.reversed-view img {
    transform: rotate(180deg);
  }

  /* HISTORY SPREAD POPUP */
  .spread-history-overlay {
    position: fixed;
    inset: 0;
    background: #000c;
    z-index: 205;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .spread-history-overlay.open { display: flex; }
  .spread-history-modal {
    background: var(--bg2);
    border: 3px solid var(--gold);
    width: 100%;
    max-width: 420px;
    position: relative;
    box-shadow: 4px 4px 0 var(--gold2);
    padding: 44px 16px 18px;
  }
  .spread-history-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 14px;
    line-height: 1.6;
  }
  .spread-history-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .spread-history-card {
    background: var(--bg3);
    border: 2px solid var(--border);
    padding: 8px 6px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .spread-history-card:hover { border-color: var(--gold2); }
  .spread-history-card img {
    width: 100%;
    aspect-ratio: 0.58;
    object-fit: cover;
    border: 1px solid var(--border);
    margin-bottom: 6px;
    image-rendering: auto;
  }
  .spread-history-card.reversed-card img {
    transform: rotate(180deg);
  }
  .spread-history-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 5px;
    color: var(--purple);
    margin-bottom: 4px;
    line-height: 1.5;
  }
  .spread-history-card-name {
    font-size: 12px;
    color: var(--text);
    line-height: 1.3;
  }

  /* ===== HISTORY TAB ===== */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .history-item {
    background: var(--bg2);
    border: 2px solid var(--border);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .history-item:hover { border-color: var(--gold2); }
  .history-item img {
    width: 40px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    image-rendering: auto;
  }
  .history-item.reversed-item img { transform: rotate(180deg); }
  .history-info { flex: 1; min-width: 0; }
  .history-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--gold);
    line-height: 1.6;
    margin-bottom: 3px;
  }
  .history-meta {
    font-size: 14px;
    color: var(--text2);
    letter-spacing: 0.5px;
  }
  .history-num {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--border);
    flex-shrink: 0;
  }
  .empty-state {
    text-align: center;
    color: var(--text2);
    padding: 40px 20px;
    font-size: 16px;
    line-height: 2;
    letter-spacing: 1px;
  }
  .empty-state .pixel-icon {
    font-size: 40px;
    display: block;
    margin-bottom: 12px;
  }

  .spread-drawn-info {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: nowrap;
    margin-bottom: 16px;
  }
  .spread-card-info {
    flex: 1;
    background: var(--bg2);
    border: 2px solid var(--border);
    padding: 6px 4px;
    text-align: center;
    min-width: 0;
  }
  .spread-slot .enlarge-btn {
    display: none;
    margin-top: 2px;
    font-size: 5px;
    padding: 5px 7px;
  }
  .spread-card-info .drawn-name {
    font-size: 6px;
    line-height: 1.4;
    margin-bottom: 3px;
  }
  .spread-card-info .drawn-meta { font-size: 11px; }
  .history-item.spread-history-item {
    align-items: flex-start;
  }
  .history-images {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .history-images img {
    width: 32px;
    height: auto;
  }

// =====================
// HELPERS
// =====================
function getDeck() {
  if (currentDeck === 'major') return CARDS.filter(c => c.arcana === 'major');
  if (currentDeck === 'minor') return CARDS.filter(c => c.arcana === 'minor');
  return CARDS;
}

function randomCard(pool, exclude = []) {
  const available = pool.filter(c => !exclude.includes(c.name));
  return available[Math.floor(Math.random() * available.length)];
}

function isReversed() {
  if (alwaysReversed) return true;
  return reversedEnabled && Math.random() < 0.5;
}

function getImg(name) {
  return CARD_IMGS[name] || '';
}

function getRemoteImg(name) {
  const local = getImg(name);
  return local.startsWith(W) ? REMOTE_W + local.slice(W.length) : '';
}

function handleCardImgError(img) {
  const remote = img.dataset.remoteSrc;
  if (remote && img.getAttribute('src') !== remote) {
    img.onerror = null;
    img.src = remote;
  }
}

function cardImgAttrs(name) {
  return `src="${getImg(name)}" data-remote-src="${getRemoteImg(name)}" onerror="handleCardImgError(this)"`;
}

function suitLabel(c) {
  if (c.arcana === 'major') return 'Major Arcana · ' + c.num;
  return c.suit.charAt(0).toUpperCase() + c.suit.slice(1) + ' · ' + c.num;
}

// =====================
// SOUND ENGINE (Web Audio API - no external files needed)
// =====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}
function playTone(freq, type, dur, vol, delay=0) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + dur + 0.05);
  } catch(e) {}
}
function sfxDraw() {
  // Mystical ascending arp
  playTone(220, 'sine', 0.15, 0.18, 0);
  playTone(330, 'sine', 0.15, 0.15, 0.1);
  playTone(440, 'sine', 0.2,  0.12, 0.2);
  playTone(550, 'triangle', 0.3, 0.1, 0.3);
}
function sfxReveal() {
  // Shimmer sparkle chord
  playTone(523, 'sine', 0.4, 0.15, 0);
  playTone(659, 'sine', 0.4, 0.12, 0.05);
  playTone(784, 'sine', 0.5, 0.10, 0.1);
  playTone(1047,'triangle', 0.3, 0.07, 0.18);
}
function sfxTab() {
  playTone(440, 'square', 0.06, 0.06);
}
function sfxToggle(on) {
  playTone(on ? 660 : 440, 'square', 0.08, 0.07);
}
function sfxFilter() {
  playTone(380, 'triangle', 0.1, 0.08);
}

// =====================
// SPARKLES (DOM-based)
// =====================
function doSparkles(x, y) {
  const container = document.getElementById('sparkle-container');
  const colors = ['#f5c842','#e040a0','#8b5cf6','#ffffff','#e6a817'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    const size = 4 + Math.random() * 6;
    const dx = (Math.random() - 0.5) * 160;
    const dy = (Math.random() - 0.5) * 160;
    const ox = x + (Math.random() - 0.5) * 30;
    const oy = y + (Math.random() - 0.5) * 30;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const dur = 600 + Math.random() * 400;
    el.style.cssText = `position:absolute;left:${ox}px;top:${oy}px;width:${size}px;height:${size}px;background:${color};border-radius:1px;transform:translate(0,0) scale(1);opacity:1;transition:transform ${dur}ms ease-out,opacity ${dur}ms ease-out;`;
    container.appendChild(el);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transform = `translate(${dx}px,${dy}px) scale(0)`;
      el.style.opacity = '0';
    }));
    setTimeout(() => el.remove(), dur + 60);
  }
}

// DRAW TAB LOGIC
// =====================
function drawSingleCard() {
  sfxDraw();
  const pool = getDeck();
  const card = randomCard(pool);
  const rev = isReversed();
  addSingleToHistory(card, rev);

  const area = document.getElementById('card-area');
  area.innerHTML = '';
  const flip = createCardFlip(card, rev, false);
  // hint goes BELOW card, card-area is flex-column so order matters
  const hint = Object.assign(document.createElement('div'), {
    className: 'card-tap-hint',
    textContent: '[ tap to reveal ]'
  });
  area.appendChild(flip);
  area.appendChild(hint);

  const info = document.getElementById('drawn-info');
  const actions = document.getElementById('drawn-actions');
  info.classList.remove('visible');
  actions.style.display = 'none';
  document.getElementById('drawn-name').textContent = card.name;
  document.getElementById('drawn-meta').textContent = suitLabel(card);
  const badge = document.getElementById('drawn-rev-badge');
  badge.innerHTML = rev ? '<span class="drawn-reversed-badge">↕ REVERSED</span>' : '';
  const enlargeBtn = document.getElementById('drawn-enlarge-btn');
  enlargeBtn._card = null;
  enlargeBtn._rev = false;

  flip.addEventListener('click', () => {
    if (flip.classList.contains('flipped')) return;
    flip.classList.add('flipped');
    sfxReveal();
    const rect = flip.getBoundingClientRect();
    doSparkles(rect.left + rect.width/2, rect.top + rect.height/2);
    setTimeout(() => {
      hint.remove();
      actions.style.display = 'flex';
      info.classList.add('visible');
      enlargeBtn._card = card;
      enlargeBtn._rev = rev;
    }, 380);
  });
}

function drawSpread() {
  sfxDraw();
  const pool = getDeck();
  const drawn = [];
  spreadCards = [];
  spreadFlipped = [false, false, false];

  for (let i = 0; i < 3; i++) {
    const card = randomCard(pool, drawn.map(c => c.name));
    const rev = isReversed();
    drawn.push(card);
    spreadCards.push({ card, rev });
  }

  addSpreadToHistory(spreadCards);

  const labels = ['PAST', 'PRESENT', 'FUTURE'];
  const container = document.getElementById('spread-cards');
  container.innerHTML = '';
  const infos = document.getElementById('spread-infos');
  infos.style.display = 'none';
  infos.innerHTML = '';

  // Remove any previous hint
  const oldHint = document.getElementById('spread-hint');
  if (oldHint) oldHint.remove();

  spreadCards.forEach(({ card, rev }, i) => {
    const slot = document.createElement('div');
    slot.className = 'spread-slot';
    const lbl = document.createElement('div');
    lbl.className = 'spread-label';
    lbl.textContent = labels[i];

    const flip = createCardFlip(card, rev, false);
    flip.style.width = '100px';
    flip.style.height = '175px';
    const enlargeBtn = document.createElement('button');
    enlargeBtn.className = 'enlarge-btn';
    enlargeBtn.type = 'button';
    enlargeBtn.textContent = '⊞ ENLARGE';
    enlargeBtn.addEventListener('click', e => {
      e.stopPropagation();
      openImageModal(card, rev);
    });

    slot.appendChild(lbl);
    slot.appendChild(flip);
    slot.appendChild(enlargeBtn);
    container.appendChild(slot);

    flip.addEventListener('click', () => {
      if (flip.classList.contains('flipped')) return;
      flip.classList.add('flipped');
      sfxReveal();
      spreadFlipped[i] = true;
      const rect = flip.getBoundingClientRect();
      doSparkles(rect.left + rect.width/2, rect.top + rect.height/2);
      enlargeBtn.style.display = 'inline-block';

      if (spreadFlipped.every(f => f)) {
        const h = document.getElementById('spread-hint');
        if (h) h.remove();
        infos.style.display = 'flex';
        infos.innerHTML = '';
        spreadCards.forEach(({ card: c, rev: r }, j) => {
          const div = document.createElement('div');
          div.className = 'spread-card-info';
          div.style.cursor = 'pointer';
          div.innerHTML = `<div class="drawn-name" style="font-size:5px">${c.name}</div><div class="drawn-meta" style="font-size:11px">${labels[j]}</div>${r ? '<span class="drawn-reversed-badge" style="font-size:5px;padding:2px 4px">↕ REV</span>' : ''}`;
          div.addEventListener('click', () => openModal(c, r));
          infos.appendChild(div);
        });
      }
    });
  });

  // Single hint, placed once, with stable id
  const hint = document.createElement('div');
  hint.id = 'spread-hint';
  hint.className = 'card-tap-hint';
  hint.textContent = '[ tap each card ]';
  hint.style.cssText = 'margin-top:8px;text-align:center;display:block;width:100%';
  document.getElementById('spread-area').appendChild(hint);
}

function createCardFlip(card, rev, autoFlip) {
  const flip = document.createElement('div');
  flip.className = 'card-flip' + (autoFlip ? ' flipped' : '');
  flip.innerHTML = `
    <div class="card-flip-inner">
      <div class="card-back"><div class="card-back-pattern">🔮</div></div>
      <div class="card-front ${rev ? 'reversed' : ''}">
        <img ${cardImgAttrs(card.name)} alt="${card.name}" loading="lazy">
      </div>
    </div>`;
  return flip;
}

// =====================
// HISTORY
// =====================
function addSingleToHistory(card, rev) {
  history.unshift({ type: 'single', name: card.name, rev, ts: Date.now() });
  if (history.length > 30) history = history.slice(0, 30);
  localStorage.setItem('tarot_history', JSON.stringify(history));
}

function addSpreadToHistory(cards) {
  history.unshift({
    type: 'spread',
    ts: Date.now(),
    cards: cards.map(({ card, rev }, index) => ({
      name: card.name,
      rev,
      label: ['PAST', 'PRESENT', 'FUTURE'][index]
    }))
  });
  if (history.length > 30) history = history.slice(0, 30);
  localStorage.setItem('tarot_history', JSON.stringify(history));
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!history.length) {
    list.innerHTML = '<div class="empty-state"><span class="pixel-icon">🔮</span>No readings yet.<br>Draw your first card!</div>';
    return;
  }
  list.innerHTML = `<div class="history-heading">⏳ Last ${history.length} Reading${history.length !== 1 ? 's' : ''}</div>`;
  history.forEach((h, i) => {
    if (h.type === 'spread') {
      const d = new Date(h.ts);
      const dateStr = d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
      const timeStr = d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12: true });
      const item = document.createElement('div');
      const cards = (h.cards || []).map(entry => ({
        ...entry,
        card: CARDS.find(c => c.name === entry.name)
      })).filter(entry => entry.card);
      if (!cards.length) return;
      item.className = 'history-item spread-history-item';
      item.innerHTML = `
        <div class="history-images">
          ${cards.map(entry => `<img ${cardImgAttrs(entry.name)} alt="${entry.name}" loading="lazy" class="${entry.rev ? 'reversed-history-img' : ''}">`).join('')}
        </div>
        <div class="history-info">
          <div class="history-name">3-CARD SPREAD</div>
          <div class="history-meta">${cards.map(entry => `${entry.label}: ${entry.name}${entry.rev ? ' | REV' : ''}`).join('<br>')}</div>
          <div class="history-time">⏱ ${dateStr} | ${timeStr}</div>
        </div>
        <div class="history-num">#${i+1}</div>`;
      item.addEventListener('click', () => openSpreadHistoryModal(cards));
      list.appendChild(item);
      return;
    }
    const card = CARDS.find(c => c.name === h.name);
    if (!card) return;
    const d = new Date(h.ts);
    const dateStr = d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
    const timeStr = d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12: true });
    const item = document.createElement('div');
    item.className = 'history-item' + (h.rev ? ' reversed-item' : '');
    item.innerHTML = `
      <img ${cardImgAttrs(h.name)} alt="${h.name}" loading="lazy" style="height:60px;width:auto">
      <div class="history-info">
        <div class="history-name">${h.name}</div>
        <div class="history-meta">${suitLabel(card)}${h.rev ? ' · ↕ REVERSED' : ''}</div>
        <div class="history-time">⏱ ${dateStr} · ${timeStr}</div>
      </div>
      <div class="history-num">#${i+1}</div>`;
    item.addEventListener('click', () => openModal(card, h.rev));
    list.appendChild(item);
  });
}

function renderGrid() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  const filtered = currentFilter === 'all' ? CARDS :
    currentFilter === 'major' ? CARDS.filter(c => c.arcana === 'major') :
    CARDS.filter(c => c.suit === currentFilter);

  filtered.forEach(card => {
    const div = document.createElement('div');
    div.className = 'grid-card';
    div.innerHTML = `<img ${cardImgAttrs(card.name)} alt="${card.name}" loading="lazy"><div class="grid-card-name">${card.name}</div>`;
    div.addEventListener('click', () => openModal(card));
    grid.appendChild(div);
  });
}

// =====================
// MODAL
// =====================
function openModal(card, startReversed = false) {
  _currentModalCard = card;
  modalReversedView = startReversed;

  const img = document.getElementById('modal-img');
  img.src = getImg(card.name);
  img.alt = card.name;
  img.dataset.remoteSrc = getRemoteImg(card.name);
  img.onerror = () => handleCardImgError(img);

  document.getElementById('modal-title').textContent = card.name;
  document.getElementById('modal-meta').textContent = suitLabel(card);
  document.getElementById('modal-keywords').textContent = card.keywords;
  document.getElementById('modal-upright-en').textContent = card.upright_en;
  document.getElementById('modal-upright-hi').textContent = card.upright_hi;
  document.getElementById('modal-reversed-en').textContent = card.reversed_en;
  document.getElementById('modal-reversed-hi').textContent = card.reversed_hi;
  document.getElementById('modal-enlarge-btn')._card = card;
  document.getElementById('modal-overlay').classList.add('open');
  updateModalView();
  syncBodyScroll();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalReversedView = false;
  _currentModalCard = null;
  syncBodyScroll();
}

function updateModalView() {
  const wrap = document.getElementById('modal-img-wrap');
  wrap.classList.toggle('reversed-view', modalReversedView);

  const tog = document.getElementById('modal-rev-toggle');
  tog.classList.toggle('on', modalReversedView);

  const lbl = document.getElementById('modal-rev-state');
  lbl.textContent = modalReversedView ? 'ON' : 'OFF';
  lbl.style.color = modalReversedView ? 'var(--pink)' : 'var(--text2)';

  document.getElementById('modal-upright-section').classList.toggle('hidden', modalReversedView);
  document.getElementById('modal-reversed-section').classList.toggle('hidden', !modalReversedView);
}

function openImageModal(card, reversed = false) {
  const img = document.getElementById('image-modal-img');
  img.src = getImg(card.name);
  img.alt = card.name;
  img.dataset.remoteSrc = getRemoteImg(card.name);
  img.onerror = () => handleCardImgError(img);
  document.getElementById('image-modal-wrap').classList.toggle('reversed-view', reversed);
  document.getElementById('image-modal-overlay').classList.add('open');
  syncBodyScroll();
}

function closeImageModal() {
  document.getElementById('image-modal-overlay').classList.remove('open');
  syncBodyScroll();
}

function openSpreadHistoryModal(cards) {
  const grid = document.getElementById('spread-history-grid');
  grid.innerHTML = '';

  cards.forEach(entry => {
    const div = document.createElement('div');
    div.className = 'spread-history-card' + (entry.rev ? ' reversed-card' : '');
    div.innerHTML = `
      <div class="spread-history-label">${entry.label}</div>
      <img ${cardImgAttrs(entry.name)} alt="${entry.name}" loading="lazy">
      <div class="spread-history-card-name">${entry.name}</div>`;
    div.addEventListener('click', () => {
      closeSpreadHistoryModal();
      openModal(entry.card, entry.rev);
    });
    grid.appendChild(div);
  });

  document.getElementById('spread-history-overlay').classList.add('open');
  syncBodyScroll();
}

function closeSpreadHistoryModal() {
  document.getElementById('spread-history-overlay').classList.remove('open');
  syncBodyScroll();
}

// =====================
// NAVIGATION
// =====================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelector(`.nav-btn[data-tab="${tab}"]`).classList.add('active');
  if (tab === 'history') renderHistory();
  if (tab === 'info') renderGrid();
}

// =====================
// EVENT LISTENERS
// =====================
document.querySelectorAll('[data-deck]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-deck]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDeck = btn.dataset.deck;
    sfxFilter();
  });
});

document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    document.getElementById('single-area').style.display = currentMode === 'single' ? 'block' : 'none';
    document.getElementById('spread-area').style.display = currentMode === 'spread' ? 'block' : 'none';
    sfxFilter();
  });
});

document.getElementById('rev-toggle').addEventListener('click', () => {
  reversedEnabled = !reversedEnabled;
  if (reversedEnabled) { alwaysReversed = false; document.getElementById('always-rev-toggle').classList.remove('on'); document.getElementById('always-rev-label').textContent = 'OFF'; document.getElementById('always-rev-label').style.color = 'var(--text2)'; }
  document.getElementById('rev-toggle').classList.toggle('on', reversedEnabled);
  document.getElementById('rev-label').textContent = reversedEnabled ? 'ON' : 'OFF';
  document.getElementById('rev-label').style.color = reversedEnabled ? 'var(--gold)' : 'var(--text2)';
  sfxToggle(reversedEnabled);
});

document.getElementById('always-rev-toggle').addEventListener('click', () => {
  alwaysReversed = !alwaysReversed;
  if (alwaysReversed) { reversedEnabled = false; document.getElementById('rev-toggle').classList.remove('on'); document.getElementById('rev-label').textContent = 'OFF'; document.getElementById('rev-label').style.color = 'var(--text2)'; }
  document.getElementById('always-rev-toggle').classList.toggle('on', alwaysReversed);
  document.getElementById('always-rev-label').textContent = alwaysReversed ? 'ON' : 'OFF';
  document.getElementById('always-rev-label').style.color = alwaysReversed ? 'var(--pink)' : 'var(--text2)';
  sfxToggle(alwaysReversed);
});

document.getElementById('draw-btn').addEventListener('click', () => {
  if (currentMode === 'single') drawSingleCard();
  else drawSpread();
});

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => { switchTab(btn.dataset.tab); sfxTab(); });
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGrid();
    sfxFilter();
  });
});

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// Modal reversed-view toggle
document.getElementById('modal-rev-toggle').addEventListener('click', () => {
  modalReversedView = !modalReversedView;
  updateModalView();
  sfxToggle(modalReversedView);
});

// Enlarge buttons open the image-only popup
document.getElementById('drawn-enlarge-btn').addEventListener('click', function() {
  if (this._card) openImageModal(this._card, this._rev);
});

document.getElementById('modal-enlarge-btn').addEventListener('click', function() {
  if (this._card) openImageModal(this._card, modalReversedView);
});

document.getElementById('image-modal-close').addEventListener('click', closeImageModal);
document.getElementById('image-modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('image-modal-overlay')) closeImageModal();
});

document.getElementById('spread-history-close').addEventListener('click', closeSpreadHistoryModal);
document.getElementById('spread-history-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('spread-history-overlay')) closeSpreadHistoryModal();
});

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js");
  });
}
</script>
</body>
</html>
